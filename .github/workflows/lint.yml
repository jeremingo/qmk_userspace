name: PR Lint keyboards

permissions:
  contents: read

on:
  pull_request:
    paths:
    - 'keyboards/jeremingo/**'

jobs:
  lint:
    runs-on: ubuntu-latest

    container: ghcr.io/qmk/qmk_cli

    steps:
    - name: Disable safe.directory check
      run : git config --global --add safe.directory '*'
      

    - name: Checkout Userspace
      uses: actions/checkout@v4
      with:
        token: ${{ github.token }}
        submodules: recursive

    - name: Check if qmk_firmware exists
      id: check_files
      uses: andstor/file-existence-action@v3
      with:
        files: qmk_firmware

    - name: Checkout QMK Firmware
      uses: actions/checkout@v4
      if: steps.check_files.outputs.files_exists == 'false'
      with:
        token: ${{ github.token }}
        path: qmk_firmware
        repository: 'qmk/qmk_firmware'
        ref: 'master'
        submodules: recursive

    - name: Install QMK CLI dependencies
      run: |
        echo '$PATH'
        echo $PATH | tr ':' '\n' | sed -e 's/^/ - /g'
        pip install -r qmk_firmware/requirements.txt

    - name: Configure QMK CLI
      run: |
        qmk config userspace_compile.parallel=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null)
        qmk config user.qmk_home=$GITHUB_WORKSPACE/qmk_firmware
        qmk config user.overlay_dir=$GITHUB_WORKSPACE


    - name: Preparation command
      run: |
        ln -s $GITHUB_WORKSPACE/keyboards/jeremingo qmk_firmware/keyboards/

    - name: Get changed files
      id: file_changes
      uses: tj-actions/changed-files@v47
      with:
        use_rest_api: true

    - name: Print git info
      run: |
        git rev-parse --short HEAD
        echo ${{ github.event.pull_request.base.sha }}
        echo '${{ steps.file_changes.outputs.all_changed_files}}'

    - name: Run qmk lint
      if: always()
      shell: 'bash {0}'
      run: |
        QMK_CHANGES=$(echo -e '${{ steps.file_changes.outputs.all_changed_files}}' | sed 's/ /\n/g')
        QMK_KEYBOARDS=$(qmk list-keyboards)

        exit_code=0

        for KB in $QMK_KEYBOARDS; do
          KEYBOARD_CHANGES=$(echo "$QMK_CHANGES" | grep -E '^(keyboards/'${KB}'/)')
          if [[ -z "$KEYBOARD_CHANGES" ]]; then
            # skip as no changes for this keyboard
            continue
          fi

          KEYMAP_ONLY=$(echo "$KEYBOARD_CHANGES" | grep -cv /keymaps/)
          if [[ $KEYMAP_ONLY -gt 0 ]]; then
            echo "linting ${KB}"

            qmk lint --strict --keyboard ${KB} && qmk info -l --keyboard ${KB}
            exit_code=$(($exit_code + $?))
          fi
        done

        qmk format-text ${{ steps.file_changes.outputs.all_changed_files}} || true
        for file in ${{ steps.file_changes.outputs.all_changed_files}}; do
          if [[ -f $file ]]; then
            if ! git diff --quiet $file; then
              echo "File '${file}' Requires Formatting"
              echo "::error file=${file}::Requires Formatting"
              exit_code=$(($exit_code + 1))
            fi
          fi
        done

        if [[ $exit_code -gt 255 ]]; then
            exit 255
        fi
        exit $exit_code

    - name: Reset git repo
      if: always()
      shell: 'bash {0}'
      run: |
        git reset --hard
        git clean -xfd

    - name: Verify keyboard targets
      if: always()
      shell: 'bash {0}'
      run: |
        exit_code=0

        for file in $(find keyboards/ -name rules.mk | grep -v /keymaps/ | grep -v /common/ | grep -v /lib/); do
            dir=$(dirname $file)

            $(find $dir -name keyboard.json -exec false {} +)
            if [[ $? == 0 ]]; then
                echo "$dir::Legacy target detected"

                ((++exit_code))
            fi
        done

        if [[ $exit_code -gt 255 ]]; then
            exit 255
        fi
        exit $exit_code

    - name: Verify keyboard aliases
      if: always()
      shell: 'bash {0}'
      run: |
        qmk ci-validate-aliases
